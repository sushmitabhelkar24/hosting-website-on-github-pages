<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy View</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            color: white;
        }

        .stars {
            width: 1px;
            height: 1px;
            background: transparent;
            box-shadow: 
                100px 200px white,
                300px 400px white,
                500px 100px white,
                700px 300px white,
                900px 500px white,
                1200px 200px white,
                1400px 450px white,
                1600px 350px white,
                1800px 150px white,
                2000px 400px white;
            animation: animStars 50s linear infinite;
        }

        @keyframes animStars {
            from {
                transform: translateY(0px);
            }
            to {
                transform: translateY(-2000px);
            }
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .button {
            margin-top: 30px;
            padding: 12px 30px;
            border: 2px solid white;
            background: transparent;
            color: white;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .button:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div class="content">
        <h1>Galaxy View</h1>
        <p>Explore the beauty of the universe</p>
        <button class="button">Discover More</button><br/>
        <button class="button">Info</button>

    </div>
</body>
</html>
